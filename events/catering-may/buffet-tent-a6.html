<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vedas — Buffet Tent Cards (Folded A6)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap');
  @page { size: A4 portrait; margin: 0; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: "Cormorant Garamond", Georgia, serif; }

  .page {
    width: 210mm; height: 297mm;
    display: grid;
    grid-template-columns: 105mm 105mm;
    grid-template-rows: 148.5mm 148.5mm;
    page-break-after: always;
    position: relative;
  }
  .page:last-child { page-break-after: auto; }

  /* cut guides: fine, widely-spaced SVG dots so the line disappears once cut */
  .cutlines { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* One A6 = one tent. Folds in half across the middle -> two A7 faces. */
  .card {
    width: 105mm; height: 148.5mm;
    position: relative;
    background: #fffdf6;
    overflow: hidden;
  }

  .half {
    height: 50%; padding: 7mm 8mm;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 2mm;
  }
  .half.top { transform: rotate(180deg); }   /* so it reads upright from the back of the tent */

  /* veg / non-veg symbol — inline SVG so it prints without "background graphics" */
  .sym { width: 7mm; height: 7mm; display: inline-block; vertical-align: middle; }

  .name { font-size: 22pt; font-weight: 600; color:#b1220c; line-height: 1.05;
          text-transform: uppercase; letter-spacing: 2.5px; margin: 0; }
  .rule { width: 18mm; border-top: 0.5mm solid #d6841f; margin: 2mm 0; }
  .desc { font-size: 13pt; font-style: italic; color:#5c4a3a; line-height: 1.28; margin: 0; }
  .desc.fr { font-size: 11pt; font-style: italic; color:#9c6b3f; margin-top: 1.5mm; }

  @media screen {
    body { background:#e9e3d8; padding: 10px; }
    .page { background:#fff; margin: 0 auto 16px; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const ITEMS = [
  { n:"Beetroot Kebab", t:"veg",
    d:"Beetroot, paneer, potatoes & fresh herbs",
    f:"Betterave, paneer, pommes de terre & herbes fraîches" },
  { n:"Cocktail Samosa", t:"veg",
    d:"Pastry stuffed with spiced potatoes, peas & Indian condiments",
    f:"Pâte garnie de pommes de terre épicées, petits pois & condiments" },
  { n:"Lilva Mattar Kachori", t:"veg",
    d:"Crispy pastry with a spicy green-pea filling",
    f:"Pâtisserie croustillante aux petits pois verts épicés" },
  { n:"Chicken Reshmi Kebab", t:"nv",
    d:"Minced chicken, green veg, capsicum & aromatic spices",
    f:"Poulet haché, légumes verts, poivron & épices" },
];

const root = document.getElementById('root');

function card(it) {
  return `<div class="card">
    <div class="half top"><div>${innerFace(it)}</div></div>
    <div class="half"><div>${innerFace(it)}</div></div>
  </div>`;
}
function symSVG(t) {
  const c = t === 'veg' ? '#1a7d2c' : '#9e1414';
  const inner = t === 'veg'
    ? `<circle cx="10" cy="10" r="4.6" fill="${c}"/>`
    : `<polygon points="10,4.6 15.4,14.6 4.6,14.6" fill="${c}"/>`;
  return `<svg class="sym" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">`
    + `<rect x="1.4" y="1.4" width="17.2" height="17.2" fill="none" stroke="${c}" stroke-width="1.8"/>`
    + inner + `</svg>`;
}
function innerFace(it) {
  return `${symSVG(it.t)}
    <h2 class="name">${it.n}</h2>
    <div class="rule"></div>
    <p class="desc">${it.d}</p>
    <p class="desc fr">${it.f}</p>`;
}

const CUTLINES = `<svg class="cutlines" viewBox="0 0 210 297" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`
  + `<g fill="none" stroke="#c7b596" stroke-width="0.18" stroke-dasharray="0.18 4.5" stroke-linecap="round">`
  + `<line x1="105" y1="0" x2="105" y2="297"/>`
  + `<line x1="0" y1="148.5" x2="210" y2="148.5"/>`
  + `</g></svg>`;

for (let i = 0; i < ITEMS.length; i += 4) {
  const page = document.createElement('div');
  page.className = 'page';
  page.innerHTML = ITEMS.slice(i, i + 4).map(card).join('') + CUTLINES;
  root.appendChild(page);
}
</script>
</body>
</html>
