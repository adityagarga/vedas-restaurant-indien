<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#b23a00">
<title>Vedas — Scannez le menu</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,180,80,.40), transparent 42%),
      radial-gradient(circle at 90% 8%, rgba(214,40,40,.30), transparent 45%),
      #fff5ec;
    color: #2a1a10;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff; border-radius: 28px; max-width: 460px; width: 100%;
    padding: 38px 34px 34px; text-align: center;
    box-shadow: 0 14px 40px rgba(120,50,10,.18);
    border: 3px solid #b23a00;
  }
  .lamp { font-size: 44px; }
  h1 { font-size: 36px; margin: 6px 0 2px; color: #b23a00; font-weight: 900; letter-spacing: 1px; }
  .sub { color:#9a6b4f; letter-spacing: 3px; text-transform: uppercase; font-size: 13px; margin-bottom: 22px; }

  .scan-label { font-size: 22px; font-weight: 800; margin: 4px 0 18px; }
  .qrbox {
    background: #fff; border: 2px dashed #e8b48a; border-radius: 18px;
    padding: 16px; display: inline-block; line-height: 0;
  }
  .qrbox img { width: 280px; height: 280px; display: block; }
  .hint { margin-top: 18px; font-size: 16px; color: #5a4032; }
  .url { margin-top: 6px; font-size: 13px; color: #b08b72; word-break: break-all; }

  .printbtn {
    margin-top: 24px; background: #b23a00; color:#fff; border:none;
    padding: 14px 26px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer;
  }

  @media print {
    body { background: #fff; }
    .card { box-shadow: none; border-color:#b23a00; }
    .printbtn { display: none; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="lamp">🪔</div>
    <h1>Vedas</h1>
    <div class="sub">Holi · Food Truck</div>

    <div class="scan-label">📲 Scannez pour voir le menu</div>

    <div class="qrbox">
      <img src="menu-qr.svg" alt="QR code du menu Vedas">
    </div>

    <div class="hint">Pointez l'appareil photo de votre téléphone</div>
    <div class="url">www.vedas-restaurant.com/food-truck</div>

    <button class="printbtn" onclick="window.print()">🖨️ Imprimer</button>
  </div>
</body>
</html>
