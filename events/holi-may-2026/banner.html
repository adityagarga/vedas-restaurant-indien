<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vedas Food Truck — Holi banner</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#fff; }
  .banner{
    width:1000px; height:380px; position:relative; overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    background:
      radial-gradient(circle at 8% 18%, rgba(255,0,140,.55), transparent 26%),
      radial-gradient(circle at 92% 22%, rgba(255,196,0,.55), transparent 26%),
      radial-gradient(circle at 18% 88%, rgba(0,200,255,.50), transparent 24%),
      radial-gradient(circle at 80% 86%, rgba(120,230,40,.50), transparent 26%),
      radial-gradient(circle at 50% 50%, rgba(160,40,255,.30), transparent 40%),
      linear-gradient(135deg, #c4200d 0%, #9c1206 55%, #b81d0a 100%);
  }
  /* scattered Holi powder dots */
  .dot{ position:absolute; border-radius:50%; filter:blur(1px); opacity:.85; }
  .d1{ width:70px;height:70px; top:30px; left:140px; background:#ffd23f; }
  .d2{ width:46px;height:46px; top:250px; left:90px; background:#39d2ff; }
  .d3{ width:60px;height:60px; top:60px; right:170px; background:#ff4fa3; }
  .d4{ width:40px;height:40px; bottom:40px; right:120px; background:#7be028; }
  .d5{ width:30px;height:30px; top:150px; left:60px; background:#ff8a00; }
  .d6{ width:34px;height:34px; bottom:70px; left:200px; background:#a857ff; }
  .scrim{ position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 30%, rgba(90,10,4,.35) 100%); }

  .inner{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:#fff; padding:0 40px; }
  .pill{
    display:inline-block; background:rgba(255,255,255,.16); border:1.5px solid rgba(255,255,255,.5);
    backdrop-filter:blur(2px); padding:8px 20px; border-radius:999px;
    font-size:18px; font-weight:800; letter-spacing:.14em; text-transform:uppercase;
  }
  h1{ font-size:118px; font-weight:900; letter-spacing:.04em; line-height:.92; margin:14px 0 0; text-shadow:0 4px 22px rgba(0,0,0,.35); }
  h2{ font-size:34px; font-weight:800; letter-spacing:.18em; text-transform:uppercase; margin-top:2px; text-shadow:0 2px 10px rgba(0,0,0,.3); }
  .sub{ margin-top:16px; font-size:21px; font-weight:700; letter-spacing:.02em; }
  .sub b{ color:#ffd23f; }
</style>
</head>
<body>
  <div class="banner">
    <span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span>
    <span class="dot d4"></span><span class="dot d5"></span><span class="dot d6"></span>
    <div class="scrim"></div>
    <div class="inner">
      <span class="pill">🎨 Holi à Paris · 31 mai 2026</span>
      <h1>VEDAS</h1>
      <h2>Food Truck Indien</h2>
      <div class="sub">Jardin d'Acclimatation · <b>le grand lâcher de couleurs</b></div>
    </div>
  </div>
</body>
</html>
