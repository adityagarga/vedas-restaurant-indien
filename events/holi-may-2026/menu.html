<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c4200d">
<title>Vedas Menu — Food Truck Indien</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    /* Solid white — maximum legibility in direct sunlight */
    background: #ffffff;
    color: #1a1208;
    min-height: 100vh;
    padding-bottom: 30px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 0 18px; }

  header { text-align: center; padding: 26px 10px 8px; }
  header h1 {
    font-size: clamp(44px, 13vw, 64px); margin: 0; font-weight: 900;
    letter-spacing: 1px; line-height: .92; color: #b81d0a;
  }
  header h2 {
    font-size: clamp(18px, 5.5vw, 26px); margin: 4px 0 0; font-weight: 800;
    letter-spacing: 1.5px; color: #1a1208; text-transform: uppercase;
  }

  /* payment line */
  .pay {
    display: flex; align-items: center; justify-content: center; flex-wrap: wrap;
    gap: 9px; margin: 16px 0 6px; font-size: 13px; font-weight: 800; letter-spacing: .5px;
    color: #4a3325;
  }
  .pay .lbl { text-transform: uppercase; }
  .pill {
    background: #c4200d; color: #fff; border-radius: 7px; padding: 5px 10px;
    font-weight: 900; font-size: 13px; letter-spacing: .5px;
  }
  .pill.cb { letter-spacing: 2px; }

  /* category header = solid red bar, white text (reads either way in sun) */
  .cat {
    margin: 24px 0 0; font-size: clamp(20px, 5.6vw, 26px); font-weight: 900;
    letter-spacing: 1px; text-transform: uppercase;
    background: #c4200d; color: #fff;
    padding: 9px 14px; border-radius: 10px;
  }

  .row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 13px 4px; border-bottom: 2px solid #f0d9cf;
  }
  .row .num { font-weight: 900; color: #b81d0a; min-width: 30px; font-size: clamp(17px,4.6vw,20px); }
  .row .name { font-size: clamp(18px, 4.8vw, 21px); font-weight: 700; color: #1a1208; }
  .row .veg {
    display: inline-block; color: #fff; background: #1a8f3c; font-weight: 900;
    font-size: 12px; line-height: 1; padding: 3px 5px; border-radius: 5px; margin-left: 6px;
    vertical-align: middle;
  }
  .row .dots { flex: 1; }
  .row .price { font-size: clamp(19px, 5.2vw, 23px); font-weight: 900; white-space: nowrap; color: #b81d0a; }

  /* inline group for drinks (compact like poster) */
  .inline {
    padding: 14px 4px; font-size: clamp(17px, 4.6vw, 20px); font-weight: 700; line-height: 1.8;
    border-bottom: 2px solid #f0d9cf; color: #1a1208;
  }
  .inline b { font-weight: 900; color: #b81d0a; }
  .inline .sep { color: #d8b3a4; margin: 0 7px; }

  footer {
    text-align: center; margin-top: 28px; padding-top: 16px;
    border-top: 2px solid #f0d9cf;
    font-size: 14px; line-height: 1.6; color: #4a3325;
  }
  footer .site { font-weight: 900; color: #b81d0a; }
  footer .site a { color: #b81d0a; text-decoration: underline; }
  footer .small { font-size: 12.5px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>VEDAS</h1>
      <h2>Food Truck Indien</h2>
    </header>

    <div id="menu"></div>

    <footer>
      <div class="site"><a href="https://www.vedas-restaurant.com" target="_blank" rel="noopener">www.vedas-restaurant.com</a> &nbsp;|&nbsp; @vedasrestaurantindien</div>
      <div class="small">Contactez-nous pour privatiser le food truck chez vous · 🪔 Happy Holi</div>
    </footer>
  </div>

<script>
// Item numbers match the physical poster. #2 was removed -> the number is skipped.
const SECTIONS = [
  { title: "Wrap", items: [
    { num: 1, n: "Wrap Chicken Tikka", p: 9 },
  ]},
  { title: "Curry Bowls avec Riz", items: [
    { num: 3, n: "Biryani au Poulet", p: 15 },
    { num: 4, n: "Daal Makhani (Lentilles Noires) + Riz", p: 15, veg: true },
    { num: 5, n: "Poulet Tikka Masala + Riz", p: 15 },
    { num: 6, n: "Agneau Rogan Josh + Riz", p: 15 },
    { num: 7, n: "Poulet Curry + Agneau Curry + Riz", p: 17 },
  ]},
  { title: "Snacks", items: [
    { num: 8, n: "Naan au Fromage", p: 4, veg: true },
    { num: 9, n: "Samosas aux Légumes x2", p: 5, veg: true },
    { num: 10, n: "Samosa Chaat", p: 8, veg: true },
  ]},
];

const DESSERTS = [
  { n: "Lassi Mango Alfonso", p: 5 },
  { n: "Gâteau Indien", p: 4 },
  { n: "Jus de Fruits Frais", p: 6 },
  { n: "Fruits Frais", p: 6 },
];

const DRINKS = [
  { n: "Café", p: 2 },
  { n: "Chai", p: 3 },
  { n: "Eau / Soda", p: 2.5 },
  { n: "Bière Blonde Indienne", p: 5 },
];

function fmt(p) { return Number.isInteger(p) ? p : p.toFixed(2).replace('.', ','); }

const el = document.getElementById('menu');

function catEl(t) { const d = document.createElement('div'); d.className='cat'; d.textContent=t; return d; }
function rowEl(it) {
  const r = document.createElement('div'); r.className='row';
  r.innerHTML = `${it.num ? `<span class="num">${it.num}.</span>` : ''}`
    + `<span class="name">${it.n}${it.veg ? '<span class="veg">VEG</span>' : ''}</span>`
    + `<span class="dots"></span><span class="price">${fmt(it.p)}&nbsp;€</span>`;
  return r;
}

SECTIONS.forEach(s => {
  el.appendChild(catEl(s.title));
  s.items.forEach(it => el.appendChild(rowEl(it)));
});

// Lassi / Dessert
el.appendChild(catEl("Lassi · Dessert"));
DESSERTS.forEach(it => el.appendChild(rowEl(it)));

// Boissons - Bière (vertical rows, like the other sections)
el.appendChild(catEl("Boissons · Bière"));
DRINKS.forEach(it => el.appendChild(rowEl(it)));
</script>
</body>
</html>
